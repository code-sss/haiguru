services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: haiguru-postgres
    environment:
      POSTGRES_USER: haiguru
      POSTGRES_PASSWORD: haiguru_pass
      POSTGRES_DB: haiguru_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - haiguru-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haiguru -d haiguru_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: haiguru-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@haiguru.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgpass:ro
    ports:
      - "5050:80"
    networks:
      - haiguru-net
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:

networks:
  haiguru-net:
    driver: bridge
